<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chat with Hawkscan AI Agent">
    <title>Chat - Hawkscan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav>
        <a href="/" class="logo">Hawkscan.</a>
        <div class="nav-links">
            <a href="/">Products</a>
            <a href="/history">Global History</a>
            <a href="/chat" class="active">Agent AI</a>
            <a href="/pricing">Pricing</a>
            <a href="/settings">Settings</a>
                <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="chat-container" style="display: flex; gap: 2rem; max-width: 1200px; margin: 0 auto; height: 75vh;">
        <div class="glass-panel sidebar" style="flex: 1; display: flex; flex-direction: column; padding: 1rem; overflow-y: auto;">
            <button id="new-chat-btn" style="margin-bottom: 1rem; padding: 0.8rem; border-radius: 8px; border: none; background: var(--accent-primary); color: white; cursor: pointer; font-weight: 600; transition: opacity 0.2s;">+ New Chat</button>
            <div id="conversation-list" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <!-- Conversations injected here -->
            </div>
        </div>
        <div class="glass-panel chat-box" style="flex: 3; display: flex; flex-direction: column; height: 100%;">
            <div class="chat-messages" id="chat-messages" style="flex: 1; overflow-y: auto; padding: 4rem;">
                <div class="message ai">
                    Hello! I am Hawkscan, your e-commerce and market analysis agent. How can I assist you today?
                </div>
            </div>
            <div class="chat-input-area" style="padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 1rem;">
                <input type="text" id="chat-input" placeholder="Type your message here..." autocomplete="off" style="flex: 1; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white;">
                <button id="send-btn" style="padding: 0.8rem 1.5rem; border-radius: 8px; border: none; background: var(--accent-primary); color: white; cursor: pointer; font-weight: 600;">Send</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
