<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset Password - Hawkscan">
    <title>Reset Password - Hawkscan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav>
        <a href="/" class="logo">Hawkscan.</a>
        <div class="nav-links">
            <a href="/login">Login</a>
            <a href="/sign-up">Sign Up</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <h1>Create New Password</h1>
                <p class="text-secondary">Enter your new secure password below.</p>
            </div>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-error" style="color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); padding: 0.75rem 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center; font-weight: 500;">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}
            
            <form action="{{ url_for('reset_password', token=token) }}" method="POST">
                <div class="input-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" placeholder="Ã¢â‚¬Â¢Ã¢â‚¬Â¢Ã¢â‚¬Â¢Ã¢â‚¬Â¢Ã¢â‚¬Â¢Ã¢â‚¬Â¢Ã¢â‚¬Â¢Ã¢â‚¬Â¢" required minlength="6">
                </div>
                <button type="submit">Update Password</button>
            </form>
        </div>
    </div>
</body>
</html>
