version: '3.8'

services:
  hawkscan-frontend:
    build: .
    container_name: hawkscan-frontend
    restart: unless-stopped
    network_mode: host
    volumes:
      # Mount the local users.db so that user data persists if the container restarts
      - ./users.db:/app/users.db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`hawkscan.tech`) || Host(`www.hawkscan.tech`)"
      - "traefik.http.routers.hermes.entrypoints=web,websecure"
      - "traefik.http.routers.hermes.tls=true"
      - "traefik.http.routers.hermes.tls.certresolver=letsencrypt"
      - "traefik.http.services.hermes.loadbalancer.server.port=5000"
    environment:
      # Ensures Flask/Gunicorn outputs logs immediately
      - PYTHONUNBUFFERED=1
      # Pass through the Anthropic API key from your environment if needed
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Pass SMTP credentials for OTP and Password Resets
      - SMTP_EMAIL=${SMTP_EMAIL}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}

  hawkscan-worker:
    build: .
    container_name: hawkscan-worker
    restart: unless-stopped
    command: ["python", "scheduler.py"]
    volumes:
      # Mount the local users.db so it accesses the same database
      - ./users.db:/app/users.db
    environment:
      - PYTHONUNBUFFERED=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SMTP_EMAIL=${SMTP_EMAIL}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
