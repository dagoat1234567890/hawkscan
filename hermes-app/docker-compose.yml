version: '3.8'

services:
  hermes-app:
    build: .
    container_name: hermes-app
    restart: unless-stopped
    volumes:
      # Mount the local users.db so that user data persists if the container restarts
      - ./users.db:/app/users.db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`hawkscan.tech`) || Host(`www.hawkscan.tech`)"
      - "traefik.http.routers.hermes.entrypoints=websecure"
      - "traefik.http.routers.hermes.tls=true"
      - "traefik.http.routers.hermes.tls.certresolver=letsencrypt"
      - "traefik.http.services.hermes.loadbalancer.server.port=5000"
    environment:
      # Ensures Flask/Gunicorn outputs logs immediately
      - PYTHONUNBUFFERED=1
      # Pass through the Anthropic API key from your environment if needed
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Pass SMTP credentials for OTP and Password Resets
      - SMTP_EMAIL=${SMTP_EMAIL}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    networks:
      - traefik
      - default

networks:
  traefik:
    external: true
  default:
    driver: bridge
