version: '3.8'

services:
  hawkscan-dashboard:
    build: .
    container_name: hawkscan-dashboard
    restart: unless-stopped
    ports:
      # Maps port 5000 on the server to port 5000 in the container
      # Visit http://YOUR_SERVER_IP:5000 to see the app
      - "5000:5000"
    volumes:
      # Mount the local users.db so that user data persists if the container restarts
      - ./users.db:/app/users.db
    environment:
      # Ensures Flask/Gunicorn outputs logs immediately
      - PYTHONUNBUFFERED=1
      # Pass through the Anthropic API key from your environment if needed
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Pass SMTP credentials for OTP and Password Resets
      - SMTP_EMAIL=${SMTP_EMAIL}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
